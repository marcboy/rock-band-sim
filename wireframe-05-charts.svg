<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="-apple-system, system-ui, sans-serif">
  <rect x="1" y="1" width="388" height="842" rx="48" fill="#fff" stroke="#222" stroke-width="2"/>
  <rect x="135" y="14" width="120" height="28" rx="14" fill="#222"/>
  <text x="30" y="36" font-size="14" font-weight="600" fill="#222">9:41</text>
  <text x="335" y="36" font-size="14" fill="#222">●●●●</text>

  <text x="195" y="92" font-size="17" font-weight="700" fill="#222" text-anchor="middle">Charts</text>

  <!-- Segmented control -->
  <rect x="20" y="110" width="350" height="32" rx="10" fill="#f1f1f1"/>
  <rect x="22" y="112" width="115" height="28" rx="8" fill="#fff" stroke="#222"/>
  <text x="80" y="131" font-size="12" font-weight="700" fill="#222" text-anchor="middle">Fans</text>
  <text x="195" y="131" font-size="12" fill="#666" text-anchor="middle">Sales</text>
  <text x="310" y="131" font-size="12" fill="#666" text-anchor="middle">Industry</text>

  <!-- Big stat -->
  <text x="20" y="170" font-size="11" fill="#888" letter-spacing="1">TOTAL FANS</text>
  <text x="20" y="206" font-size="32" font-weight="700" fill="#222">48,210</text>
  <text x="20" y="226" font-size="12" fill="#22a06b">▲ 18% over 12 weeks</text>

  <!-- Line chart -->
  <g>
    <rect x="20" y="244" width="350" height="200" rx="12" fill="#fafafa" stroke="#ddd"/>
    <!-- gridlines -->
    <line x1="20" y1="290" x2="370" y2="290" stroke="#eee"/>
    <line x1="20" y1="340" x2="370" y2="340" stroke="#eee"/>
    <line x1="20" y1="390" x2="370" y2="390" stroke="#eee"/>
    <!-- axis labels -->
    <text x="30" y="288" font-size="9" fill="#aaa">50k</text>
    <text x="30" y="338" font-size="9" fill="#aaa">30k</text>
    <text x="30" y="388" font-size="9" fill="#aaa">10k</text>
    <!-- fan line -->
    <polyline points="40,410 70,402 100,388 130,378 160,355 190,348 220,330 250,318 280,290 310,270 340,260 365,250" fill="none" stroke="#222" stroke-width="2"/>
    <!-- album release markers -->
    <line x1="160" y1="244" x2="160" y2="444" stroke="#d29900" stroke-dasharray="3 3"/>
    <text x="164" y="258" font-size="9" fill="#d29900">EP</text>
    <line x1="280" y1="244" x2="280" y2="444" stroke="#d29900" stroke-dasharray="3 3"/>
    <text x="284" y="258" font-size="9" fill="#d29900">LP2</text>
  </g>

  <!-- Source breakdown -->
  <text x="20" y="476" font-size="13" font-weight="700" fill="#222" letter-spacing="1">WHERE FANS CAME FROM</text>

  <g font-size="12">
    <text x="20" y="500" fill="#666">Album sales</text>
    <rect x="140" y="490" width="200" height="12" rx="6" fill="none" stroke="#222"/>
    <rect x="140" y="490" width="116" height="12" rx="6" fill="#222"/>
    <text x="350" y="500" fill="#222" text-anchor="end">58%</text>

    <text x="20" y="528" fill="#666">Live shows</text>
    <rect x="140" y="518" width="200" height="12" rx="6" fill="none" stroke="#222"/>
    <rect x="140" y="518" width="48" height="12" rx="6" fill="#222"/>
    <text x="350" y="528" fill="#222" text-anchor="end">24%</text>

    <text x="20" y="556" fill="#666">Press / radio</text>
    <rect x="140" y="546" width="200" height="12" rx="6" fill="none" stroke="#222"/>
    <rect x="140" y="546" width="22" height="12" rx="6" fill="#222"/>
    <text x="350" y="556" fill="#222" text-anchor="end">11%</text>

    <text x="20" y="584" fill="#666">Word of mouth</text>
    <rect x="140" y="574" width="200" height="12" rx="6" fill="none" stroke="#222"/>
    <rect x="140" y="574" width="14" height="12" rx="6" fill="#222"/>
    <text x="350" y="584" fill="#222" text-anchor="end">7%</text>
  </g>

  <!-- Top 100 -->
  <text x="20" y="624" font-size="13" font-weight="700" fill="#222" letter-spacing="1">INDIE ROCK CHART</text>

  <g font-size="13">
    <rect x="20" y="636" width="350" height="38" rx="10" fill="none" stroke="#ddd"/>
    <text x="34" y="660" font-weight="700" fill="#222">#12</text>
    <text x="74" y="660" font-weight="600" fill="#222">Midnight Drive</text>
    <text x="356" y="660" fill="#22a06b" text-anchor="end">▲ 4</text>

    <rect x="20" y="680" width="350" height="38" rx="10" fill="none" stroke="#ddd"/>
    <text x="34" y="704" font-weight="700" fill="#222">#34</text>
    <text x="74" y="704" font-weight="600" fill="#222">Glass City (album)</text>
    <text x="356" y="704" fill="#c44" text-anchor="end">▼ 2</text>

    <rect x="20" y="724" width="350" height="38" rx="10" fill="none" stroke="#ddd"/>
    <text x="34" y="748" font-weight="700" fill="#222">#78</text>
    <text x="74" y="748" font-weight="600" fill="#222">Bonfire Sessions (EP)</text>
    <text x="356" y="748" fill="#888" text-anchor="end">—</text>
  </g>

  <!-- Tab bar -->
  <line x1="0" y1="784" x2="390" y2="784" stroke="#eee"/>
  <g font-size="10" text-anchor="middle">
    <circle cx="50" cy="805" r="8" fill="none" stroke="#888"/>
    <text x="50" y="828" fill="#888">Band</text>
    <circle cx="128" cy="805" r="8" fill="none" stroke="#888"/>
    <text x="128" y="828" fill="#888">Studio</text>
    <circle cx="206" cy="805" r="8" fill="none" stroke="#888"/>
    <text x="206" y="828" fill="#888">Albums</text>
    <circle cx="284" cy="805" r="8" fill="none" stroke="#888"/>
    <text x="284" y="828" fill="#888">Tour</text>
    <circle cx="362" cy="805" r="8" fill="#222"/>
    <text x="362" y="828" fill="#222" font-weight="600">Charts</text>
  </g>
</svg>
